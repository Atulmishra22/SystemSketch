version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: systemsketch_postgres
    environment:
      POSTGRES_USER: systemsketch
      POSTGRES_PASSWORD: systemsketch
      POSTGRES_DB: systemsketch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systemsketch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

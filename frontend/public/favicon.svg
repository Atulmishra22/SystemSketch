<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background gradient: deep ink -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1A1612"/>
      <stop offset="100%" stop-color="#231C14"/>
    </linearGradient>

    <!-- Node stroke gradients -->
    <linearGradient id="amberGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#E5A830"/>
      <stop offset="100%" stop-color="#C98B28"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#D4522A"/>
      <stop offset="100%" stop-color="#B03A18"/>
    </linearGradient>
    <linearGradient id="sageGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5E7E69"/>
      <stop offset="100%" stop-color="#4E6B57"/>
    </linearGradient>

    <!-- Soft glow on shapes -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ──────────────────────────────────────── -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- ── Dot grid (canvas texture) ──────────────────────── -->
  <g fill="#C98B28" opacity="0.13">
    <!-- Row at y=20 -->
    <circle cx="22" cy="20" r="1.1"/><circle cx="36" cy="20" r="1.1"/>
    <circle cx="50" cy="20" r="1.1"/><circle cx="64" cy="20" r="1.1"/>
    <circle cx="78" cy="20" r="1.1"/>
    <!-- Row at y=34 -->
    <circle cx="22" cy="34" r="1.1"/><circle cx="78" cy="34" r="1.1"/>
    <!-- Row at y=48 -->
    <circle cx="22" cy="48" r="1.1"/><circle cx="78" cy="48" r="1.1"/>
    <!-- Row at y=62 -->
    <circle cx="22" cy="62" r="1.1"/><circle cx="78" cy="62" r="1.1"/>
    <!-- Row at y=76 -->
    <circle cx="22" cy="76" r="1.1"/><circle cx="36" cy="76" r="1.1"/>
    <circle cx="50" cy="76" r="1.1"/><circle cx="64" cy="76" r="1.1"/>
    <circle cx="78" cy="76" r="1.1"/>
  </g>

  <!-- ── Connector: rect → circle (top) ─────────────────── -->
  <line x1="44" y1="28" x2="56" y2="28"
        stroke="#C98B28" stroke-width="1.6" stroke-dasharray="3,2.4" opacity="0.55"/>
  <!-- arrowhead → right -->
  <polygon points="56,25 62,28 56,31" fill="#C98B28" opacity="0.7"/>

  <!-- ── Connector: rect → bottom-rect ──────────────────── -->
  <line x1="29" y1="39" x2="42" y2="57"
        stroke="#C98B28" stroke-width="1.6" stroke-dasharray="3,2.4" opacity="0.45"/>

  <!-- ── Connector: circle → bottom-rect ────────────────── -->
  <line x1="68" y1="41" x2="58" y2="57"
        stroke="#C98B28" stroke-width="1.6" stroke-dasharray="3,2.4" opacity="0.45"/>
  <!-- arrowhead → down-left (into bottom rect) -->
  <polygon points="53,57 62,55 59,63" fill="#C98B28" opacity="0.6"/>

  <!-- ── Node 1: Rectangle (amber) — top-left ────────────── -->
  <rect x="12" y="18" width="32" height="20" rx="5"
        fill="#C98B2814" stroke="url(#amberGlow)" stroke-width="2.2"
        filter="url(#glow)"/>

  <!-- ── Node 2: Circle (red-terracotta) — top-right ────── -->
  <circle cx="70" cy="28" r="12"
          fill="#C0431F0D" stroke="url(#redGlow)" stroke-width="2.2"
          filter="url(#glow)"/>

  <!-- ── Node 3: Rectangle (sage) — bottom-center ───────── -->
  <rect x="34" y="58" width="30" height="18" rx="5"
        fill="#4E6B5710" stroke="url(#sageGlow)" stroke-width="2.2"
        filter="url(#glow)"/>

  <!-- ── Pencil (nib) — bottom-right corner ─────────────── -->
  <g transform="translate(81,81) rotate(-42)" filter="url(#glow)">
    <!-- eraser cap -->
    <rect x="-3.8" y="-17" width="7.6" height="4.5" rx="1.2" fill="#C0431F"/>
    <!-- ferrule band -->
    <rect x="-3.8" y="-12.5" width="7.6" height="2.5" fill="#8B6914"/>
    <!-- pencil body (amber wood) -->
    <rect x="-3.8" y="-10" width="7.6" height="14" rx="1" fill="#C98B28"/>
    <!-- pencil grain line -->
    <line x1="0" y1="-10" x2="0" y2="4" stroke="#8B6914" stroke-width="0.9" opacity="0.4"/>
    <!-- pencil tip (paper-white) -->
    <polygon points="-3.8,4 3.8,4 0,12" fill="#F5F0E8"/>
    <!-- graphite tip -->
    <polygon points="-1,10 1,10 0,12" fill="#3A3530"/>
  </g>

  <!-- ── Ambient glow beneath pencil ────────────────────── -->
  <circle cx="81" cy="81" r="10" fill="#C98B28" opacity="0.07" filter="url(#softGlow)"/>
</svg>

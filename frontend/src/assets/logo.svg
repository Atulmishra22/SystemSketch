<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72">
  <defs>
    <!-- Icon background gradient -->
    <linearGradient id="ibg" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1A1612"/>
      <stop offset="100%" stop-color="#231C14"/>
    </linearGradient>

    <!-- Node stroke gradients -->
    <linearGradient id="wAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#E5A830"/>
      <stop offset="100%" stop-color="#C98B28"/>
    </linearGradient>
    <linearGradient id="wRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#D4522A"/>
      <stop offset="100%" stop-color="#B03A18"/>
    </linearGradient>
    <linearGradient id="wSage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5E7E69"/>
      <stop offset="100%" stop-color="#4E6B57"/>
    </linearGradient>

    <!-- Text gradient: amber → warm red -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E5A830"/>
      <stop offset="60%"  stop-color="#C98B28"/>
      <stop offset="100%" stop-color="#C0431F"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="wGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#C98B28" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ── ICON BLOCK (0,0 → 72,72) ── -->
  <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#ibg)"/>

  <!-- Dot grid (canvas texture) -->
  <g fill="#C98B28" opacity="0.13">
    <circle cx="15" cy="14" r="0.9"/><circle cx="26" cy="14" r="0.9"/>
    <circle cx="37" cy="14" r="0.9"/><circle cx="48" cy="14" r="0.9"/>
    <circle cx="57" cy="14" r="0.9"/>
    <circle cx="15" cy="24" r="0.9"/><circle cx="57" cy="24" r="0.9"/>
    <circle cx="15" cy="34" r="0.9"/><circle cx="57" cy="34" r="0.9"/>
    <circle cx="15" cy="44" r="0.9"/><circle cx="57" cy="44" r="0.9"/>
    <circle cx="15" cy="54" r="0.9"/><circle cx="26" cy="54" r="0.9"/>
    <circle cx="37" cy="54" r="0.9"/><circle cx="48" cy="54" r="0.9"/>
    <circle cx="57" cy="54" r="0.9"/>
  </g>

  <!-- Connectors -->
  <line x1="31" y1="20" x2="40" y2="20" stroke="#C98B28" stroke-width="1.3"
        stroke-dasharray="2.5,2" opacity="0.55"/>
  <polygon points="40,17.5 44,20 40,22.5" fill="#C98B28" opacity="0.65"/>
  <line x1="21" y1="28" x2="29" y2="40" stroke="#C98B28" stroke-width="1.3"
        stroke-dasharray="2.5,2" opacity="0.45"/>
  <line x1="50" y1="29" x2="43" y2="40" stroke="#C98B28" stroke-width="1.3"
        stroke-dasharray="2.5,2" opacity="0.45"/>
  <polygon points="38,40 45,38 43,45" fill="#C98B28" opacity="0.6"/>

  <!-- Node 1: Rect (amber) — top-left -->
  <rect x="8" y="13" width="22" height="14" rx="3.5"
        fill="#C98B2813" stroke="url(#wAmber)" stroke-width="1.8" filter="url(#wGlow)"/>

  <!-- Node 2: Circle (red-terracotta) — top-right -->
  <circle cx="51" cy="20" r="9"
          fill="#C0431F0C" stroke="url(#wRed)" stroke-width="1.8" filter="url(#wGlow)"/>

  <!-- Node 3: Rect (sage) — bottom-center -->
  <rect x="23" y="41" width="22" height="13" rx="3.5"
        fill="#4E6B5710" stroke="url(#wSage)" stroke-width="1.8" filter="url(#wGlow)"/>

  <!-- Pencil / nib — bottom-right -->
  <g transform="translate(58,58) rotate(-42)" filter="url(#wGlow)">
    <rect x="-2.8" y="-12.5" width="5.6" height="3.3" rx="0.9" fill="#C0431F"/>
    <rect x="-2.8" y="-9.2"  width="5.6" height="1.8" fill="#8B6914"/>
    <rect x="-2.8" y="-7.4"  width="5.6" height="10"  rx="0.8" fill="#C98B28"/>
    <line x1="0" y1="-7.4" x2="0" y2="2.6" stroke="#8B6914" stroke-width="0.7" opacity="0.4"/>
    <polygon points="-2.8,2.6 2.8,2.6 0,9" fill="#F5F0E8"/>
    <polygon points="-0.7,7.5 0.7,7.5 0,9" fill="#3A3530"/>
  </g>

  <!-- ── WORDMARK TEXT (84,0 → 310,72) ── -->

  <!-- "System" — Fraunces italic, amber gradient -->
  <text
    x="84" y="46"
    font-family="'Fraunces', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="32"
    letter-spacing="-0.5"
    fill="url(#textGrad)"
    filter="url(#textShadow)"
  >System</text>

  <!-- "Sketch" — Instrument Sans semibold, paper white -->
  <text
    x="198" y="46"
    font-family="'Instrument Sans', system-ui, sans-serif"
    font-weight="600"
    font-size="32"
    letter-spacing="-0.5"
    fill="#F5F0E8"
    opacity="0.92"
  >Sketch</text>

  <!-- Thin amber rule beneath wordmark -->
  <rect x="84" y="52" width="220" height="1.5" rx="1"
        fill="url(#textGrad)" opacity="0.35"/>

  <!-- Tagline -->
  <text
    x="84" y="65"
    font-family="'Instrument Sans', system-ui, sans-serif"
    font-weight="400"
    font-size="10"
    letter-spacing="2.5"
    fill="#C98B28"
    opacity="0.6"
  >COLLABORATIVE CANVAS</text>
</svg>
